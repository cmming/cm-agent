services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: cmagent
      MYSQL_DATABASE: cm_agent
    ports:
      - "3306:3306"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cmagent
      POSTGRES_PASSWORD: cmagent
      POSTGRES_DB: cm_agent
    ports:
      - "5432:5432"

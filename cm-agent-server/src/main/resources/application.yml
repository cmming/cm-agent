server:
  port: ${cm-agent.config.server-port:8080}

spring:
  application:
    name: cm-agent-server
  profiles:
    # CM_AGENT_PROFILE remains supported for deployment compatibility, but no profile is selected by default.
    active: ${CM_AGENT_PROFILE:}
    group:
      prod: production

management:
  endpoints:
    web:
      exposure:
        include: health,info

cm-agent:
  security:
    jwt-secret: ${cm-agent.config.jwt-secret:}
    bootstrap-admin-enabled: ${cm-agent.config.bootstrap-admin-enabled:false}
    bootstrap-admin-username: ${cm-agent.config.bootstrap-admin-username:admin}
    bootstrap-admin-password: ${cm-agent.config.bootstrap-admin-password:}
    bootstrap-admin-display-name: ${cm-agent.config.bootstrap-admin-display-name:系统管理员}
    public-api-docs-enabled: ${cm-agent.config.public-api-docs-enabled:true}
  fake-runtime-enabled: ${cm-agent.config.fake-runtime-enabled:false}
  agentscope:
    enabled: ${cm-agent.config.agentscope-enabled:false}
    model-timeout: ${cm-agent.config.agentscope-model-timeout:60s}
    tool-timeout: ${cm-agent.config.agentscope-tool-timeout:30s}
    model-max-attempts: ${cm-agent.config.agentscope-model-max-attempts:2}
  http-tools:
    enabled: ${cm-agent.config.http-tools-enabled:false}
    allow-http: ${cm-agent.config.http-tools-allow-http:false}
    allowed-hosts: ${cm-agent.config.http-tools-allowed-hosts:}
    min-timeout: ${cm-agent.config.http-tools-min-timeout:100ms}
    max-timeout: ${cm-agent.config.http-tools-max-timeout:30s}
    max-response-bytes: ${cm-agent.config.http-tools-max-response-bytes:262144}
    max-redirects: ${cm-agent.config.http-tools-max-redirects:3}
  default-tenant-code: ${cm-agent.config.default-tenant-code:default}
  persistence:
    mode: ${cm-agent.config.persistence-mode:memory}
    jdbc:
      url: ${cm-agent.config.jdbc-url:}
      username: ${cm-agent.config.jdbc-username:}
      password: ${cm-agent.config.jdbc-password:}
      driver-class-name: ${cm-agent.config.jdbc-driver-class-name:}
